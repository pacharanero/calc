# release-plz config for calc.
#
# Strategy: ONE workspace version (single-sourced in the root Cargo.toml,
# inherited via `version.workspace = true`); release-plz bumps that on every
# release. calc-core publishes to crates.io. calc-cli rides the same version
# but does NOT publish - its distribution story is binaries via cargo-dist
# (planned), not `cargo install`-able from crates.io.

[workspace]
# Default: do not release/publish individual crates. Each crate that should
# release opts in below. This keeps surprise crates (e.g. a future
# experimental crate added to the workspace) off crates.io until explicit.
release = false
publish = false

# Use the standard `v{major}.{minor}.{patch}` tag scheme, matching every
# sibling repo and what cargo-dist will expect once it lands.
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# Keep released-PR diffs in one Cargo.lock, not per-crate.
dependencies_update = true

[changelog]
# git-cliff-compatible config kept inline so this file is self-contained.
# Conventional-commit groups, reverse-chronological per-section ordering,
# repo URL injected for "compare" links between tags.
header = "# Changelog\n\nAll notable changes to this project are documented here.\n"
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat=\"v\") }}] - {{ timestamp | date(format=\"%Y-%m-%d\") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute=\"group\") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}\
        - {{ commit.message | upper_first | trim }}{% if commit.breaking %} **BREAKING**{% endif %}\n\
    {% endfor %}\
{% endfor %}\n
"""
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^doc", group = "Documentation" },
  { message = "^refactor", group = "Changed" },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
  { message = "^bump", skip = true },
]
sort_commits = "newest"

# ----- per-crate overrides -----

[[package]]
# THE published crate. GitEHR consumes this via release-plz (which cannot
# follow git deps), so getting calc-core onto crates.io is the unblocker for
# downstream consumers.
name = "calc-core"
release = true
publish = true
changelog_path = "CHANGELOG.md"
# `docs.rs` builds the crate's docs automatically once published, so no
# extra metadata needed here beyond the package-level fields already in
# calc-core/Cargo.toml.

[[package]]
# calc-cli rides the workspace version but does not publish to crates.io yet.
# When cargo-dist + the homebrew tap land (see ROADMAP.md), flip publish to
# true and `cargo install calc-cli` works straight from crates.io without
# --git. Until then it ships only via `cargo install --git ... calc-cli`.
name = "calc-cli"
release = false
publish = false
