# release-plz owns calc's Rust release automation. On every push to main it
# opens (or refreshes) a Release PR that bumps the workspace version (in the
# root Cargo.toml) and rewrites CHANGELOG.md from the conventional commits
# since the last release. Merging that PR creates the git tag, the GitHub
# Release, and (for crates with publish = true in release-plz.toml) the
# crates.io publication.
#
# What publishes: calc-core only. calc-cli rides the workspace version but
# is held back until the binary distribution story (cargo-dist + homebrew
# tap) lands - see ROADMAP.md.
#
# ACTIVATION: two repo secrets need to be set before this workflow does
# anything. Until both are present the jobs guard themselves out cleanly,
# so this workflow can sit committed and dormant.
#
#   1. RELEASE_PLZ_TOKEN  - a fine-grained GitHub PAT scoped to this repo
#      with contents:write + pull-requests:write. The default GITHUB_TOKEN
#      cannot open PRs that themselves trigger workflows (GitHub's
#      anti-recursion rule), and several orgs block it from opening PRs at
#      all. A PAT is the release-plz-recommended setup.
#   2. CARGO_REGISTRY_TOKEN - a crates.io API token with publish-new and
#      publish-update permissions on the `calc-core` crate. Generate at
#      https://crates.io/settings/tokens . Without it the release job
#      tags and creates the GitHub Release but skips the crates.io push.

name: release-plz

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]
  # Manual trigger - useful for re-running after the one-off token setup,
  # or for cutting a release on demand without needing a no-op commit.
  workflow_dispatch:

jobs:
  # Tag + create the GitHub Release + cargo publish once a Release PR is merged.
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    steps:
      - name: Check for release token
        id: guard
        env:
          TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RELEASE_PLZ_TOKEN not set - release-plz is dormant (see release-plz.yml header)."
          fi
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - if: steps.guard.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: release-plz release
        if: steps.guard.outputs.enabled == 'true'
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Open/refresh the Release PR (version bump + changelog) from conventional commits.
  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Check for release token
        id: guard
        env:
          TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RELEASE_PLZ_TOKEN not set - release-plz is dormant (see release-plz.yml header)."
          fi
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - if: steps.guard.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: release-plz release-pr
        if: steps.guard.outputs.enabled == 'true'
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
